<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A2342"/>
      <stop offset="40%" stop-color="#0A1F3A"/>
      <stop offset="70%" stop-color="#07162B"/>
      <stop offset="100%" stop-color="#030B16"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="15%" r="60%">
      <stop offset="0%" stop-color="rgba(56,189,248,0.12)"/>
      <stop offset="50%" stop-color="rgba(56,189,248,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="ray1" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="rgba(56,189,248,0.08)"/>
